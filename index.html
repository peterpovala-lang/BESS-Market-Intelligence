                text:'Germany: inertia market (Jan 2026, fixed-price contracts). Greece: opened BESS to balancing. Spain: new voltage control rules. Grid-forming requirements (ENTSO-E Phase II) create premium revenue for compliant BESS. The total addressable revenue stack expands even as individual product prices compress.',
                color:'#00897B'},
            ].map(({n,title,text,color})=>(
              <div key={n} style={{background:'#fff',border:'1px solid #E8EDF2',borderLeft:`4px solid ${color}`,borderRadius:5,padding:12}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{width:24,height:24,borderRadius:12,background:color,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0}}>{n}</div>
                  <div style={{fontWeight:700,color:'#1B2A4A',fontSize:13}}>{title}</div>
                </div>
                <div style={{fontSize:11,color:'#3A4A5C',marginTop:5,paddingLeft:32,lineHeight:1.6}}>{text}</div>
              </div>
            ))}
          </div>

          {/* Model validation */}
          <div style={{background:'#E0F2F1',borderLeft:'4px solid #00897B',padding:14,borderRadius:5,fontSize:12,lineHeight:1.7}}>
            <strong style={{color:'#1B2A4A'}}>Model validation against this analysis:</strong> Your revenue assumption of €45k/MW/month (=€540k/yr)
            with -18%/yr taper and 40% floor (=€216k/yr) maps precisely onto the convergence trajectory above.
            The 40% floor sits between Germany (€237k, saturated) and France (€251k, moderate competition) — mature
            European steady state. Your Signet Bank debt (5-year tenor) is fully repaid in the premium/compression phase
            (2026–2029) before prices reach the floor. The real risk isn't zero prices — it's capital recovery timing, and
            your structure already handles that correctly.
          </div>
        </div>
      )}

      {/* ═══ STRUCTURAL FACTORS ═══ */}
      {tab==='factors' && (
        <div>
          <h2 style={{color:'#1B2A4A',fontSize:16,margin:'0 0 8px'}}>Six Structural Factors Explaining European BESS Revenue Variance</h2>
          <div style={{display:'grid',gap:8}}>
            {[
              {f:'1. Grid isolation / interconnection',impact:'HIGH',c:'#CC0000',t:'Islands and semi-islands (Baltics, DK2, Iberia) show 107% avg CV vs 56% for well-connected. Trapped volatility = higher BESS value per MW.'},
              {f:'2. Synchronisation events',impact:'EXTREME',c:'#CC0000',t:'Baltic desync from Russia: +766%. A one-time structural shift — permanent loss of Russian inertia. The single largest signal in the entire dataset.'},
              {f:'3. Renewable duck curve',impact:'HIGH',c:'#E68A00',t:'DK2/Sweden: 2–3× summer/winter ratio from wind/solar oversupply. Romania nearly flat (1.08×). Poland/Germany duck curves growing with solar buildout.'},
              {f:'4. Ancillary market design',impact:'MED-HIGH',c:'#E68A00',t:'Baltic BBCM: 2–10× Finnish prices. Italy: lowest revenue despite high RES because ancillary market was closed to BESS. Market access rules override fundamentals.'},
              {f:'5. BESS saturation / overbuild ratio',impact:'MEDIUM',c:'#1565C0',t:'UK: £150k→£50k when overbuild ratio hit 1.5×. Belgium: 492→208. Prices converge to arbitrage opportunity cost — never zero, but can compress 60–70%.'},
              {f:'6. Seasonality patterns',impact:'VARIES',c:'#8B99A8',t:'Baltics: 3× summer premium. Romania: nearly flat year-round. Revenue predictability varies dramatically — affects bankability and debt structuring.'},
            ].map(({f,impact,c,t})=>(
              <div key={f} style={{background:'#fff',border:'1px solid #E8EDF2',borderLeft:`4px solid ${c}`,borderRadius:4,padding:10}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div style={{fontWeight:700,color:'#1B2A4A',fontSize:12}}>{f}</div>
                  <div style={{fontSize:9,fontWeight:700,color:c,background:`${c}15`,padding:'2px 6px',borderRadius:3}}>{impact}</div>
                </div>
                <div style={{fontSize:11,color:'#3A4A5C',marginTop:4,lineHeight:1.5}}>{t}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ═══ SUMMARY TABLE (always visible) ═══ */}
      <div style={{marginTop:16,overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:10}}>
          <thead><tr style={{background:'#1B2A4A',color:'#fff'}}>
            {['Country','Mean','Latest (Jan 26)','Pre-Sync','Post-Sync','Δ%'].map(h=>(<th key={h} style={{padding:'4px 5px',textAlign:'left',fontWeight:600}}>{h}</th>))}
          </tr></thead>
          <tbody>{siStats.map((s,i)=>(
            <tr key={s.country} style={{background:i%2===0?'#fff':'#F5F7FA'}}>
              <td style={{padding:'3px 5px',fontWeight:600,color:SI_COLORS[s.country]}}>{s.country}</td>
              <td style={{padding:'3px 5px'}}>{s.mean}</td>
              <td style={{padding:'3px 5px'}}>{s.latest}</td>
              <td style={{padding:'3px 5px'}}>{s.preMean}</td>
              <td style={{padding:'3px 5px'}}>{s.postMean}</td>
              <td style={{padding:'3px 5px',fontWeight:700,color:s.syncChange>100?'#00897B':s.syncChange>0?'#1565C0':'#CC0000'}}>{s.syncChange>0?'+':''}{s.syncChange}%</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
      <p style={{fontSize:9,color:'#8B99A8',marginTop:8}}>Sources: Clean Horizon Storage Index (uploaded), IRENA Renewable Capacity Statistics 2025, SolarPower Europe EMMES 2025, Wood Mackenzie, Modo Energy, Energy-Storage.News, AST Latvia, Elering, national TSO/regulator reports.</p>
    </div>
  );
}
